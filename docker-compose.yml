# Development — hot reload for both backend and frontend
# Usage: docker compose up

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: breathe
      POSTGRES_USER: breathe
      POSTGRES_PASSWORD: breathe
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U breathe"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    command: >
      sh -c "python wait_for_db.py &&
             python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    restart: on-failure
    volumes:
      - ./backend:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://breathe:breathe@db:5432/breathe
      SECRET_KEY: dev-docker-secret-key-change-in-prod
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      API_TARGET: http://backend:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  media_data:
